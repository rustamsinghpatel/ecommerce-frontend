<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aut Login Singup </title>

<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/auth.css">

</head>
<body>

  <!-- ===== Navbar (Same as Website) ===== -->
  <header>
  <div class="logo">
  <img src="images/logo (1).webp" alt="Shop Logo">
</div>

  <nav class="nav-links">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html">Products</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="header-right">
    <div class="cart">
      <a href="cart.html">
        🛒 <span class="cart-count">0</span>
      </a>  
    </div>
  </div>
</header>


  <!-- ===== AUTH SECTION ===== -->
  <section class="auth-section">

    <div class="auth-container">

      <!-- Toggle Buttons -->
      <div class="toggle-buttons">
        <button id="loginToggle" class="active">Login</button>
        <button id="signupToggle">Sign Up</button>
      </div>


      <!-- ================= LOGIN FORM ================= -->
      <form id="loginForm" class="form active">

        <h2>Login</h2>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email">
          <small class="error"></small>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password">
          <small class="error"></small>
        </div>
        <a href="#" class="forgot-password">Forgot Password?</a>
        <button type="submit" class="auth-btn">Login</button>
      </form>


      <!-- ================= SIGNUP FORM ================= -->

      <form id="signupForm" class="form">
        <h2>Create Account</h2>
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter full name">
          <small class="error"></small>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="Enter email">
          <small class="error"></small>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Create password">
          <small class="error"></small>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm password">
          <small class="error"></small>
        </div>
        <button type="submit" class="auth-btn">Sign Up</button>

      </form>

    </div>
  </section>

  <script src="scripts/auth.js"></script>
  <script type="module" src="scripts/firebase.js"></script>
  
</body>
</html>

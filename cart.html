<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles/main.css">

</head>
<body>

<header>

  </div>

  <nav class="nav-links">

      <li><a href="product.html">Products</a></li>

  <div class="header-right">
